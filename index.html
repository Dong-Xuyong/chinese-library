<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="description" content="More Life Chinese — mobile vocabulary library and Anki-style study" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>More Life Chinese</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <nav class="tab-bar" aria-label="Primary">
      <button type="button" class="tab is-active" data-tab="library" aria-controls="view-library">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 5h7v14H4zM13 5h7v14h-7z"/><path d="M8 8h1M8 12h1M17 8h1M17 12h1"/></svg>
        Library
      </button>
      <button type="button" class="tab" data-tab="study" aria-controls="view-study">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
        Study
      </button>
      <button type="button" class="tab" data-tab="progress" aria-controls="view-progress">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 19V5M10 19V9M16 19v-6M22 19H2"/><path d="M10 9l3-3 3 2 4-5"/></svg>
        Progress
      </button>
    </nav>

    <div class="app-shell">
    <main class="main">
      <section id="view-library" class="view view-library" aria-label="Library">
        <div class="library-toolbar">
          <label class="search-field">
            <span class="search-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            </span>
            <span class="sr-only">Search</span>
            <input
              id="search-input"
              type="search"
              placeholder="Search hanzi, pinyin, meaning…"
              autocomplete="off"
              enterkeyhint="search"
            />
          </label>

          <div class="filter-row">
            <div id="status-filters" class="status-filters" role="group" aria-label="Status">
              <button type="button" class="chip chip-status is-active" data-status="all">All</button>
              <button type="button" class="chip chip-status" data-status="learning">Learning</button>
              <button type="button" class="chip chip-status" data-status="known">Known</button>
            </div>
            <button type="button" id="filters-toggle" class="btn-filters" aria-expanded="false" aria-controls="filters-panel">
              Filters
              <span class="filters-caret" aria-hidden="true"></span>
            </button>
          </div>

          <div id="filters-panel" class="filters-panel" hidden>
            <label class="select-field">
              <span class="field-label">Part of speech</span>
              <select id="pos-filter">
                <option value="">All POS</option>
              </select>
            </label>
            <div class="keyword-block">
              <span class="field-label">Topics</span>
              <div id="keyword-chips" class="keyword-chips" aria-label="Keyword filters"></div>
            </div>
          </div>

          <p id="stats-line" class="stats-line" aria-live="polite">Loading…</p>
        </div>

        <div id="card-list" class="card-list" role="list"></div>

        <div id="card-detail" class="card-detail" hidden aria-hidden="true">
          <div class="detail-backdrop" data-close-detail></div>
          <article class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-hanzi">
            <div class="detail-handle" aria-hidden="true"></div>
            <button type="button" class="detail-close" data-close-detail aria-label="Close">×</button>
            <div id="detail-body" class="detail-body"></div>
          </article>
        </div>
      </section>

      <section id="view-study" class="view view-study" hidden aria-label="Study">
        <div id="study-idle" class="study-idle">
          <div class="study-hero" aria-hidden="true">
            <span class="study-hero-glyph">练</span>
          </div>
          <h2 class="study-title">Study session</h2>
          <p class="study-lead">Review due cards with Anki-style ratings. Progress stays on this phone.</p>

          <div id="study-filters" class="study-filters">
            <label class="select-field">
              <span class="field-label">Status</span>
              <select id="study-status">
                <option value="all">All</option>
                <option value="learning">Learning</option>
                <option value="known">Known</option>
              </select>
            </label>
            <label class="select-field">
              <span class="field-label">Topic</span>
              <select id="study-keyword">
                <option value="">All topics</option>
              </select>
            </label>
          </div>

          <button type="button" id="study-start" class="btn btn-primary btn-block">Start study</button>
          <p id="study-empty" class="study-empty" hidden>No cards due. Check back later or widen filters.</p>
        </div>

        <div id="study-session" class="study-session" hidden>
          <div class="study-progress-wrap">
            <div class="study-progress-bar" aria-hidden="true">
              <div id="study-progress-fill" class="study-progress-fill"></div>
            </div>
            <p id="study-progress" class="study-progress"></p>
          </div>

          <div id="flashcard" class="flashcard" role="button" tabindex="0" aria-label="Flashcard — tap to flip">
            <div id="flashcard-front" class="flashcard-face flashcard-front"></div>
            <div id="flashcard-back" class="flashcard-face flashcard-back" hidden></div>
          </div>

          <button type="button" id="btn-reveal" class="btn btn-secondary btn-block">Reveal answer</button>

          <div id="study-actions" class="study-actions" hidden>
            <button type="button" id="btn-again" class="btn btn-rate btn-again">
              <span class="rate-key">1</span>
              Again
            </button>
            <button type="button" id="btn-hard" class="btn btn-rate btn-hard">
              <span class="rate-key">2</span>
              Hard
            </button>
            <button type="button" id="btn-good" class="btn btn-rate btn-good">
              <span class="rate-key">3</span>
              Good
            </button>
            <button type="button" id="btn-easy" class="btn btn-rate btn-easy">
              <span class="rate-key">4</span>
              Easy
            </button>
          </div>
        </div>
      </section>

      <section id="view-progress" class="view view-progress" hidden aria-label="Progress">
        <div id="progress-root" class="progress-root">
          <p class="progress-loading">Loading charts…</p>
        </div>
      </section>

      <div id="loading-banner" class="banner banner-loading" hidden>Loading vocabulary…</div>
      <div id="error-banner" class="banner banner-error" hidden></div>
    </main>
    </div>
  </div>

  <script src="./js/audio.js?v=3" defer></script>
  <script src="./js/srs.js?v=3" defer></script>
  <script src="./js/cards.js?v=3" defer></script>
  <script src="./js/progress.js?v=3" defer></script>
  <script src="./js/app.js?v=3" defer></script>
</body>
</html>
